<!DOCTYPE html>
<html>
<head>
    <title>Hannan's Gym</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Hannan's Gym</h2>
    <h2 class="text-center mb-4">Registration Page</h2>

    <div class="card p-4">
        
        <label class="form-label">First Name</label>
        <input type="text" id="firstName" class="form-control mb-3">

        <label class="form-label">Last Name</label>
        <input type="text" id="lastName" class="form-control mb-3">

        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control mb-3">

        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control mb-3">

        <label class="form-label">Date of Birth</label>
        <input type="date" id="dob" class="form-control mb-3">

        <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>
    </div>

    <div id="output" class="mt-4"></div>
</div>

<script>
function registerUser() {

    let firstName = document.getElementById("firstName").value;
    let lastName = document.getElementById("lastName").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let dob = document.getElementById("dob").value;

    let output = document.getElementById("output");

    if (!firstName || !lastName || !email || !password || !dob) {
        output.innerHTML = "<div class='alert alert-danger'>All fields are required.</div>";
        return;
    }

    if (!(password.includes("!") || password.includes("?"))) {
        output.innerHTML = "<div class='alert alert-danger'>Password must contain ! or ?</div>";
        return;
    }

    let user = {
        firstName: firstName,
        lastName: lastName,
        email: email,
        password: password,
        dob: dob
    };

    let maskedPassword = "*".repeat(user.password.length);

    output.innerHTML =
        "<div class='alert alert-success'>" +
        "<h4>Registration Successful!</h4>" +
        "First Name: " + user.firstName + "<br>" +
        "Last Name: " + user.lastName + "<br>" +
        "Email: " + user.email + "<br>" +
        "Password: " + maskedPassword + "<br>" +
        "Date of Birth: " + user.dob +
        "</div>";
}
</script>

</body>
</html>
